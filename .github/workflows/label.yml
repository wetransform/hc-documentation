name: Label

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - master

jobs:
  label:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - name: Apply PR labels
      uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
      with:
        repo-token: "${{ secrets.LABELER_TOKEN }}"
        sync-labels: true

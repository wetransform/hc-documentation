name: Label

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - master

jobs:
  label:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - name: Apply PR labels
      uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
      with:
        repo-token: "${{ secrets.LABELER_TOKEN }}"
        sync-labels: true
